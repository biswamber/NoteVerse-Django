{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

Followers of {{ profile_user.username }}

</h2>

{% for follow in followers %}

<div class="card mb-3">

<div class="card-body d-flex align-items-center">

<img src="{{ follow.follower.profile.image.url }}"
class="rounded-circle me-3"
width="60"
height="60">

<div>

<a href="{% url 'user_profile' follow.follower.username %}">

{{ follow.follower.username }}

</a>

</div>

</div>

</div>

{% empty %}

<div class="alert alert-info">

No Followers Yet

</div>

{% endfor %}

{% endblock %}
