{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

{{ profile_user.username }} is Following

</h2>

{% for follow in following %}

<div class="card mb-3">

<div class="card-body d-flex align-items-center">

<img src="{{ follow.following.profile.image.url }}"
class="rounded-circle me-3"
width="60"
height="60">

<div>

<a href="{% url 'user_profile' follow.following.username %}">

{{ follow.following.username }}

</a>

</div>

</div>

</div>

{% empty %}

<div class="alert alert-info">

Not Following Anyone

</div>

{% endfor %}

{% endblock %}
